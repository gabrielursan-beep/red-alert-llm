name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - AI Chat
        - Knowledge Bases
        - Encrypted Vault
        - Setup / Installation
        - Launcher Scripts
        - Documentation
        - Mobile (Android/iOS)
        - Other
    validations:
      required: true
