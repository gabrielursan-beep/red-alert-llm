name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 10
        - Windows 11
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: ram
    attributes:
      label: RAM (GB)
      placeholder: "e.g., 8"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - AI Chat (llamafile)
        - AI Chat (KoboldCpp)
        - Wikipedia (Kiwix)
        - Setup Script
        - Launcher Script
        - START-HERE.html
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Plugged SSD into...
        2. Ran...
        3. Saw error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots (optional)
    validations:
      required: false
